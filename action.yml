name: 'Setup Jamf CLI'
description: 'Install jamf-cli and add it to PATH'
branding:
  icon: 'terminal'
  color: 'red'

inputs:
  version:
    description: 'Version to install (e.g. "1.3.0", "v1.3.0", or "latest")'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token used to resolve the latest version'
    required: false
    default: ${{ github.token }}
  no-color:
    description: 'Set NO_COLOR=1 for all subsequent steps in the job (disables ANSI color in jamf-cli output)'
    required: false
    default: 'false'

outputs:
  version:
    description: 'The installed version (without v prefix)'
    value: ${{ steps.install.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install Jamf CLI
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        VERSION="$INPUT_VERSION"

        # Resolve "latest" to the actual tag
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(gh release view --repo Jamf-Concepts/jamf-cli --json tagName -q .tagName)
        fi

        # Normalise: asset names have no v prefix, tags do
        ASSET_VERSION="${VERSION#v}"

        # Detect platform
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)

        case "$OS" in
          darwin)
            ASSET="jamf-cli-${ASSET_VERSION}-darwin-universal.tar.gz"
            ;;
          linux)
            case "$ARCH" in
              x86_64)  ARCH="amd64" ;;
              aarch64) ARCH="arm64" ;;
              *)
                echo "::error::Unsupported Linux architecture: $ARCH"
                exit 1
                ;;
            esac
            ASSET="jamf-cli-${ASSET_VERSION}-linux-${ARCH}.tar.gz"
            ;;
          *)
            echo "::error::Unsupported OS: $OS"
            exit 1
            ;;
        esac

        URL="https://github.com/Jamf-Concepts/jamf-cli/releases/download/v${ASSET_VERSION}/${ASSET}"
        CHECKSUMS_URL="https://github.com/Jamf-Concepts/jamf-cli/releases/download/v${ASSET_VERSION}/checksums.txt"

        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"

        WORK_DIR=$(mktemp -d)
        trap 'rm -rf "$WORK_DIR"' EXIT

        echo "Downloading $URL"
        curl -fsSL "$URL" -o "$WORK_DIR/$ASSET"
        curl -fsSL "$CHECKSUMS_URL" -o "$WORK_DIR/checksums.txt"

        echo "Verifying checksum"
        (cd "$WORK_DIR" && grep "$ASSET" checksums.txt | shasum -a 256 --check --status)

        echo "Extracting"
        tar -xz -C "$INSTALL_DIR" -f "$WORK_DIR/$ASSET" jamf-cli
        chmod +x "$INSTALL_DIR/jamf-cli"

        echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        echo "version=${ASSET_VERSION}" >> "$GITHUB_OUTPUT"
        echo "Installed jamf-cli v${ASSET_VERSION}"

    - name: Disable color output
      if: ${{ inputs.no-color == 'true' }}
      shell: bash
      run: echo "NO_COLOR=1" >> "$GITHUB_ENV"
